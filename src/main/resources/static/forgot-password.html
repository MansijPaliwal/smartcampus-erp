<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCampus ERP — Reset Password</title>
  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">
  <!-- Core Design System -->
  <link rel="stylesheet" href="/design-system.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--color-surface);
      position: relative;
      padding: var(--space-4);
    }
    
    .theme-toggle-container {
      position: absolute;
      top: var(--space-4);
      right: var(--space-4);
    }
    
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      background-color: var(--color-surface-raised);
      border: 1px solid var(--color-border);
    }
    
    .back-btn-container {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      margin-bottom: var(--space-4);
      font-size: var(--text-sm);
    }
    .back-btn-container a {
      color: var(--color-text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
    }
    .back-btn-container a:hover {
      color: var(--color-text-primary);
      text-decoration: none;
    }
    
    .card-title {
      font-size: var(--text-2xl);
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: var(--space-2);
    }
    
    .card-subtext {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-5);
    }
    
    .success-container {
      text-align: center;
      display: none;
    }
    .success-icon {
      font-size: 48px;
      color: var(--color-success);
      margin-bottom: var(--space-4);
    }
    .success-title {
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: var(--space-2);
    }
    
    .error-alert {
      display: none;
      background-color: var(--color-danger-light);
      color: var(--color-danger);
      font-size: var(--text-sm);
      padding: var(--space-3);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
      border: 1px solid rgba(217, 48, 37, 0.1);
    }
    
    .footer-text {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      margin-top: var(--space-6);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="theme-toggle-container">
    <button class="theme-toggle-btn" id="theme-toggle" title="Toggle Light/Dark Mode">
      <span class="material-symbols-outlined">dark_mode</span>
    </button>
  </div>

  <div class="login-card">
    <!-- STEP 1: REQUEST FORM -->
    <div id="step-request">
      <div class="back-btn-container">
        <a href="/login">
          <span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span>
          <span>Back to login</span>
        </a>
      </div>

      <div class="card-title">Reset your password</div>
      <div class="card-subtext">Enter your email address and we'll send you a link to reset your password.</div>

      <div class="error-alert" id="error-box"></div>

      <form id="request-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" class="form-control" placeholder="name@smartcampus.edu" required autocomplete="email">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; height: 44px; margin-top: var(--space-2);" id="btn-submit">
          <span>Send reset link</span>
        </button>
      </form>
    </div>

    <!-- STEP 2: SUCCESS VIEW -->
    <div id="step-success" class="success-container">
      <span class="material-symbols-outlined success-icon">check_circle</span>
      <div class="success-title">Check your email</div>
      <div class="card-subtext" id="success-message">We sent a password reset link to [email]. The link expires in 15 minutes.</div>

      <button class="btn btn-secondary" style="width: 100%; height: 44px; margin-bottom: var(--space-3);" onclick="window.open('https://gmail.com', '_blank')">
        <span>Open Gmail</span>
      </button>

      <button class="btn btn-ghost" style="width: 100%; height: 40px;" id="btn-resend">
        <span>Resend email</span>
      </button>

      <a href="/login" class="btn btn-ghost" style="width: 100%; height: 40px; margin-top: var(--space-2); color: var(--color-brand);">
        <span>Back to login</span>
      </a>
    </div>
  </div>

  <div class="footer-text">
    &copy; 2026 SmartCampus ERP System
  </div>

  <script>
    // Theme Management
    const themeToggle = document.getElementById('theme-toggle');
    const iconSpan = themeToggle.querySelector('.material-symbols-outlined');
    
    function applyTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        if (iconSpan) iconSpan.textContent = 'light_mode';
      } else {
        document.documentElement.removeAttribute('data-theme');
        if (iconSpan) iconSpan.textContent = 'dark_mode';
      }
      localStorage.setItem('sc_theme', theme);
    }
    
    const savedTheme = localStorage.getItem('sc_theme') || 'light';
    applyTheme(savedTheme);
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    });

    // Form logic
    const reqForm = document.getElementById('request-form');
    const btnSubmit = document.getElementById('btn-submit');
    const errorBox = document.getElementById('error-box');
    const stepRequest = document.getElementById('step-request');
    const stepSuccess = document.getElementById('step-success');
    const successMsg = document.getElementById('success-message');
    const btnResend = document.getElementById('btn-resend');

    let currentEmail = '';

    reqForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      btnSubmit.disabled = true;
      btnSubmit.innerHTML = '<div class="spinner"></div>';

      currentEmail = document.getElementById('email').value;

      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email: currentEmail })
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({ message: 'User not found' }));
          throw new Error(errData.message || 'Failed to request reset. Please try again.');
        }

        // Show Success
        successMsg.textContent = `We sent a password reset link to ${currentEmail}. The link expires in 15 minutes.`;
        stepRequest.style.display = 'none';
        stepSuccess.style.display = 'block';

      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = '<span>Send reset link</span>';
      }
    });

    // Cooldown logic for resend button
    btnResend.addEventListener('click', async () => {
      if (btnResend.disabled) return;
      
      btnResend.disabled = true;
      
      let countdown = 60;
      btnResend.textContent = `Resend email in ${countdown}s`;
      
      const timer = setInterval(() => {
        countdown--;
        btnResend.textContent = `Resend email in ${countdown}s`;
        if (countdown <= 0) {
          clearInterval(timer);
          btnResend.disabled = false;
          btnResend.textContent = 'Resend email';
        }
      }, 1000);

      // Re-trigger email API
      try {
        await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email: currentEmail })
        });
      } catch (err) {
        console.error('Failed to resend:', err);
      }
    });
  </script>
</body>
</html>
